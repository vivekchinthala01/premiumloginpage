<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova | Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;

background:
linear-gradient(135deg,
#EEF2FF,
#F8FAFC,
#FDF2F8);

overflow:hidden;
position:relative;

}

/* Floating Background */

.blob{

position:absolute;
border-radius:50%;
filter:blur(70px);
opacity:.55;
animation:float 10s ease-in-out infinite;

}

.blob:nth-child(1){

width:320px;
height:320px;

background:#7C3AED;

top:-120px;
left:-100px;

}

.blob:nth-child(2){

width:280px;
height:280px;

background:#06B6D4;

right:-90px;
bottom:-80px;

animation-delay:2s;

}

.blob:nth-child(3){

width:220px;
height:220px;

background:#EC4899;

top:50%;
left:60%;

animation-delay:4s;

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-25px);
}

100%{
transform:translateY(0px);
}

}

.container{

position:relative;
z-index:5;

width:420px;

}

.card{

backdrop-filter:blur(22px);

background:rgba(255,255,255,.72);

border:1px solid rgba(255,255,255,.4);

box-shadow:
0 20px 60px rgba(15,23,42,.15);

border-radius:28px;

padding:45px;

transition:.35s;

}

.card:hover{

transform:translateY(-6px);

box-shadow:
0 30px 80px rgba(76,29,149,.18);

}

.logo{

width:70px;
height:70px;

margin:auto;
margin-bottom:20px;

border-radius:20px;

display:flex;
align-items:center;
justify-content:center;

font-size:30px;

background:
linear-gradient(135deg,
#6D5DF6,
#8B5CF6);

color:white;

box-shadow:
0 12px 25px rgba(109,93,246,.35);

}

h1{

text-align:center;

font-size:32px;

color:#111827;

margin-bottom:8px;

}

.subtitle{

text-align:center;

font-size:14px;

color:#6B7280;

margin-bottom:35px;

}

.input-box{

margin-bottom:22px;

}

.input-box label{

display:block;

margin-bottom:8px;

font-size:14px;

font-weight:500;

color:#374151;

}

.input-field{

display:flex;

align-items:center;

background:white;

border:1px solid #E5E7EB;

border-radius:16px;

padding:0 16px;

transition:.3s;

height:56px;

}

.input-field:hover{

border-color:#8B5CF6;

}

.input-field:focus-within{

border-color:#6D5DF6;

box-shadow:
0 0 0 4px rgba(109,93,246,.15);

}

.input-field i{

color:#9CA3AF;

font-size:16px;

}

.input-field input{

border:none;

outline:none;

background:transparent;

flex:1;

margin-left:12px;

font-size:15px;

color:#111827;

}

.input-field input::placeholder{

color:#9CA3AF;

}

.toggle-password{

cursor:pointer;

transition:.3s;

}

.toggle-password:hover{

color:#6D5DF6;

}

.options{

display:flex;

justify-content:space-between;

align-items:center;

margin-top:-5px;

margin-bottom:28px;

font-size:14px;

}

.options label{

display:flex;

align-items:center;

gap:8px;

color:#6B7280;

cursor:pointer;

}

.options input{

accent-color:#6D5DF6;

}

.options a{

text-decoration:none;

color:#6D5DF6;

font-weight:500;

transition:.3s;

}

.options a:hover{

color:#4F46E5;

}

.login-btn{

width:100%;

height:56px;

border:none;

border-radius:16px;

font-size:16px;

font-weight:600;

cursor:pointer;

color:white;

background:
linear-gradient(
135deg,
#6D5DF6,
#8B5CF6);

transition:.35s;

box-shadow:
0 12px 25px rgba(109,93,246,.35);

}

.login-btn:hover{

transform:translateY(-3px);

box-shadow:
0 18px 35px rgba(109,93,246,.45);

}

.divider{

display:flex;

align-items:center;

margin:28px 0;

color:#9CA3AF;

font-size:13px;

}

.divider::before,
.divider::after{

content:"";

flex:1;

height:1px;

background:#E5E7EB;

}

.divider span{

padding:0 15px;

}

.social{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

}

.social button{

height:54px;

border-radius:15px;

border:1px solid #E5E7EB;

background:white;

cursor:pointer;

font-size:15px;

font-weight:500;

transition:.3s;

display:flex;

justify-content:center;

align-items:center;

gap:10px;

}

.social button:hover{

transform:translateY(-2px);

border-color:#6D5DF6;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

.social .google i{

color:#EA4335;

}

.social .github i{

color:#24292F;

}

.signup{

text-align:center;

margin-top:30px;

font-size:14px;

color:#6B7280;

}

.signup a{

text-decoration:none;

color:#6D5DF6;

font-weight:600;

}

.signup a:hover{

color:#4F46E5;

}
```
