 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#1d2671,#c33764,#00c6ff,#0072ff);
    background-size:400% 400%;
    animation:gradient 12s ease infinite;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.login-box{
    width:380px;
    padding:45px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 20px 40px rgba(0,0,0,.3);
    color:white;
}

.login-box h1{
    text-align:center;
    margin-bottom:10px;
    font-size:34px;
}

.login-box p{
    text-align:center;
    opacity:.8;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:22px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,.15);
    color:white;
    font-size:15px;
    transition:.3s;
}

.input-group input::placeholder{
    color:#ddd;
}

.input-group input:focus{
    background:rgba(255,255,255,.22);
    box-shadow:0 0 10px rgba(255,255,255,.4);
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    margin-bottom:25px;
}

.options a{
    color:white;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:white;
    color:#333;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    background:#f1f1f1;
    box-shadow:0 15px 25px rgba(0,0,0,.3);
}

.signup{
    text-align:center;
    margin-top:25px;
    font-size:15px;
}

.signup a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.signup a:hover{
    text-decoration:underline;
}

@media(max-width:450px){

.login-box{
    width:90%;
    padding:35px;
}

}
</style>

</head>
<body>

<div class="login-box">

<h1>Welcome</h1>
<p>Sign in to continue</p>

<form>

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter your password">
</div>

<div class="options">
<label>
<input type="checkbox">
 Remember me
</label>

<a href="forgot.html">Forgot Password?</a>
</div>

<button type="button" onclick="login()">Login</button>

<div class="signup">
Don't have an account?
<a href="register.html">Create Account</a>
</div>

</form>

</div>
<script>
function login(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
